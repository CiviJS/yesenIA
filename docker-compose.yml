services:
  yensenia:
    build: .
    container_name: yensenia-app
    networks:
      - app-network
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules 

  nginx:
    image: nginx:alpine
    container_name: yensenia-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www:ro # Montar como solo lectura (ro) es mejor práctica
      - ./docker/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - yensenia
    networks:
      - app-network

networks:
  app-network:
    driver: bridge