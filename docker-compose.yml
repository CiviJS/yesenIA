services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: yesenia-app
    container_name: yesenia-app
    working_dir: /var/www
    volumes:
      - .:/var/www
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database/database.sqlite
    command: sh -c "php artisan key:generate --force || true && touch database/database.sqlite && chmod 666 database/database.sqlite && php artisan migrate --force && php-fpm"
    networks:
      - yesenia-network

  nginx:
    image: nginx:alpine
    container_name: yesenia-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - yesenia-network

networks:
  yesenia-network:
    driver: bridge