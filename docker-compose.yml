services:
  yensenia:
    build: .
    container_name: yensenia-app
    restart: always
    env_file:
      - .env  
    networks:
      - app-network
    volumes:
      - yensenia-root:/var/www

  nginx:
    image: nginx:alpine
    container_name: yensenia-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - yensenia-root:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - yensenia
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  yensenia-root:
